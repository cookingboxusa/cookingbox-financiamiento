<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso al Portal - CookingBox</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container" style="max-width:420px;">

    <div style="text-align:center; margin: 30px 0 20px;">
        <h1 style="font-size:1.5rem; margin-bottom:4px;">CookingBox Food Trailers</h1>
        <p style="color:#666; font-size:0.95rem;">Portal de Solicitud de Financiamiento</p>
    </div>

    <div class="card">
        <h2 style="text-align:center;">Ingresa tus datos de acceso</h2>
        <p style="font-size:0.88rem; color:#666; text-align:center; margin-top:0;">
            Tu usuario y contraseña fueron enviados por CookingBox.
        </p>

        {% if error %}
        <p style="background:#fdecea; color:#c0392b; padding:10px; border-radius:8px; font-size:0.9rem;">
            {{ error }}
        </p>
        {% endif %}

        <form method="POST">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" autocomplete="username"
                   placeholder="Tu usuario" required>

            <label for="clave">Contraseña</label>
            <input type="password" id="clave" name="clave" autocomplete="current-password"
                   placeholder="Tu contraseña" required>

            <button type="submit" style="margin-top:16px;">Ingresar</button>
        </form>
    </div>

    <p style="text-align:center; color:#aaa; font-size:0.8rem; margin-top:20px;">
        ¿No tienes acceso? Contacta a CookingBox Food Trailers.
    </p>
</div>
</body>
</html>
